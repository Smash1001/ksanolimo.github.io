baseURL = 'https://smash1001.github.io/ksanolimo.github.io/'
locale = 'en-us'
title = 'Kai Sano Lim'
canonifyURLs = true
relativeURLs = false

[pagination]
  pagerSize = 6

[outputs]
  page = ['HTML']
  home = ['HTML', 'RSS', 'JSON']
  section = ['HTML', 'RSS']
  taxonomy = ['HTML', 'RSS']
  term = ['HTML', 'RSS']

[module]
[[module.imports]]
  path = 'github.com/zetxek/adritian-free-hugo-theme'

[[module.mounts]]
  source = 'archetypes'
  target = 'archetypes'

[[module.mounts]]
  source = 'assets'
  target = 'assets'

[[module.mounts]]
  source = 'i18n'
  target = 'i18n'

[[module.mounts]]
  source = 'layouts'
  target = 'layouts'

[[module.mounts]]
  source = 'static'
  target = 'static'

[[module.mounts]]
  source = 'node_modules/bootstrap/scss'
  target = 'assets/scss/bootstrap'

[[module.mounts]]
  source = 'node_modules/bootstrap/dist/js'
  target = 'assets/js/bootstrap'

[[module.mounts]]
  source = 'node_modules/bootstrap/dist/js/bootstrap.bundle.min.js'
  target = 'assets/js/vendor/bootstrap.bundle.min.js'

[[module.mounts]]
  source = 'node_modules/bootstrap-print-css/css/bootstrap-print.css'
  target = 'assets/css/bootstrap-print.css'

[params]
  title = 'Kai Sano Lim'
  description = 'Recent San Jose State University graduate pursuing opportunities in global operations, supply chain, logistics, and marketing.'
  themeColor = '#546e7a'
  colorScheme = 'slate'

[params.seo]
  siteName = 'Kai Sano Lim'
  siteDescription = 'Professional portfolio and resume for Kai Sano Lim, focused on global operations, supply chain, logistics, and marketing.'

[params.seo.person]
  name = 'Kai Sano Lim'
  url = 'https://smash1001.github.io/ksanolimo.github.io/'
  sameAs = ['https://www.linkedin.com/in/kai-s-lim']

[params.plugins]

[[params.plugins.css]]
  URL = 'css/custom.css'

[[params.plugins.css]]
  URL = 'css/adritian-icons.css'

[[params.plugins.css]]
  URL = 'css/bootstrap-print.css'

[[params.plugins.js]]
  URL = 'js/rad-animations.js'

[[params.plugins.js]]
  URL = 'js/sticky-header.js'

[[params.plugins.js]]
  URL = 'js/library/fontfaceobserver.js'

[[params.plugins.scss]]
  URL = 'scss/adritian.scss'

[params.colorTheme]

[params.colorTheme.selector.disable]
  footer = false
  header = false
  mobileHeader = false

[params.navbarOverflow]
  mode = 'dropdown'

[build]
  writeStats = true

[build.buildStats]
  enable = true
  enabledFor = ['scss']
  disableClasses = false
  disableIDs = false
  disableTags = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    lineNos = false
    noClasses = false
    style = 'github'

[languages]
[languages.en]
  disabled = false
  locale = 'en-us'
  direction = 'ltr'
  label = 'English'
  title = ''
  weight = 1

[[languages.en.menus.header]]
  name = 'Home'
  URL = '/'
  weight = 1

[[languages.en.menus.header]]
  name = 'About'
  URL = '/about/'
  weight = 2

[[languages.en.menus.header]]
  name = 'Resume'
  URL = '/resume/'
  weight = 3

[[languages.en.menus.header]]
  pre = 'linkedin'
  name = ''
  URL = 'https://www.linkedin.com/in/kai-s-lim'
  weight = 4

[[languages.en.menus.header]]
  pre = 'email'
  name = 'Email'
  URL = 'mailto:ksano.limo.int@gmail.com'
  weight = 5

[[languages.en.menus.footer]]
  name = 'About'
  URL = '/about/'
  weight = 1

[[languages.en.menus.footer]]
  name = 'Resume'
  URL = '/resume/'
  weight = 2

[[languages.en.menus.footer]]
  name = 'LinkedIn'
  URL = 'https://www.linkedin.com/in/kai-s-lim'
  weight = 3